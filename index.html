<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/design/avatars/early-adopter.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synthetic Users Lab — AI-powered UX simulation</title>
    <meta name="description" content="Simulate synthetic user personas against any product flow. Get UX scores, friction points and actionable issues — without recruiting real users." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Synthetic Users Lab" />
    <meta property="og:title" content="Synthetic Users Lab — AI-powered UX simulation" />
    <meta property="og:description" content="Simulate synthetic user personas against any product flow. Get UX scores, friction points and actionable issues — without recruiting real users." />
    <meta property="og:image" content="%VITE_APP_URL%/api/og" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="%VITE_APP_URL%" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Synthetic Users Lab — AI-powered UX simulation" />
    <meta name="twitter:description" content="Simulate synthetic user personas against any product flow. Get UX scores, friction points and actionable issues — without recruiting real users." />
    <meta name="twitter:image" content="%VITE_APP_URL%/api/og" />

    <script>
      /* Plausible Analytics — only injected when VITE_PLAUSIBLE_DOMAIN is set at build time */
      (function () {
        var domain = "%VITE_PLAUSIBLE_DOMAIN%";
        if (!domain || domain === "%VITE_PLAUSIBLE_DOMAIN%") return;
        var s = document.createElement("script");
        s.defer = true;
        s.dataset.domain = domain;
        s.src = "https://plausible.io/js/script.js";
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
